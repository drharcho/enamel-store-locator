name: PHP Lint

on:
  push:
    paths:
      - 'wordpress-plugin/**'
  pull_request:
    paths:
      - 'wordpress-plugin/**'

jobs:
  lint:
    name: PHP Syntax Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Check PHP syntax
        run: |
          echo "Scanning wordpress-plugin/ for PHP syntax errors..."
          find wordpress-plugin -name "*.php" | while read file; do
            php -l "$file" || exit 1
          done
          echo "✅ All PHP files passed syntax check."
